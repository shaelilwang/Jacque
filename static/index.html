<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jacque</title>
  <style>
    :root { --ink: #111; --muted: #777; --hair: #e5e5e5; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 24px; color: var(--ink);
    }

    /* ---- header: centered title, cost link pinned top-right ---- */
    header { position: relative; padding-top: 4px; }
    h1 {
      text-align: center; font-size: 44px; font-weight: 700;
      letter-spacing: .04em; margin: 8px 0 40px;
      font-family: Garamond, "EB Garamond", "Adobe Garamond Pro", "Apple Garamond",
                   Baskerville, "Times New Roman", serif;
    }
    .cost-link {
      position: absolute; top: 0; right: 0;
      background: none; border: 0; padding: 0; font: inherit; font-size: 13px;
      color: var(--muted); text-decoration: underline; text-underline-offset: 3px;
      cursor: pointer;
    }
    .cost-link:hover { color: var(--ink); }
    #cost-panel {
      position: absolute; top: 26px; right: 0; width: 380px; max-width: 92vw;
      border: 1px solid var(--hair); border-radius: 12px; background: #fff;
      padding: 14px 16px; box-shadow: 0 8px 30px rgba(0,0,0,.12);
      font-size: 13px; z-index: 20;
    }
    #cost-panel .cost-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    #cost-panel ul { margin: 8px 0 0; padding-left: 18px; }
    #cost-panel button { font: inherit; font-size: 12px; cursor: pointer; }

    /* ---- centered hero controls ---- */
    #stage {
      position: relative; display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 160px);
    }
    .hero {
      position: relative;
      display: flex; flex-direction: column; align-items: flex-start; gap: 26px;
      transition: transform .6s cubic-bezier(.4, 0, .2, 1);
    }
    /* On Go: the whole first column slides left to make room for the analysis. */
    #stage.active .hero { transform: translateX(-39vw); }
    /* Plain text (no button chrome), set in Garamond. Still a label that opens
       the file picker on click. */
    .want {
      cursor: pointer; color: var(--ink);
      font-family: Garamond, "EB Garamond", "Adobe Garamond Pro", "Apple Garamond",
                   Baskerville, "Times New Roman", serif;
      font-size: 16px; font-weight: 500; letter-spacing: .01em;
    }
    .want:hover { text-decoration: underline; text-underline-offset: 5px; }
    .want:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
    /* Uploaded-image preview, resized to fit, shown above the button. */
    .preview {
      max-width: 260px; max-height: 300px; border-radius: 12px; display: block;
      box-shadow: 0 4px 18px rgba(0,0,0,.12);
    }
    .preview[hidden] { display: none; }   /* don't render the empty img before upload */

    /* Analysis block: appears centre-stage on Go and types out Sonnet's read. */
    .analysis-stage {
      position: absolute; left: 36%; top: 50%;
      transform: translate(-50%, -50%) scale(.96);
      width: min(340px, 28vw); max-height: 80vh; overflow: auto;
      opacity: 0; pointer-events: none;
      transition: opacity .5s ease, transform .5s ease;
    }
    #stage.active .analysis-stage {
      opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto;
    }
    .typed {
      font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; line-height: 1.8; letter-spacing: .01em;
      white-space: pre-wrap; margin: 0; color: var(--ink);
    }
    .typed.typing::after { content: "▋"; margin-left: 1px; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    /* Budget + search sit below the typed read with a big gap; fade in after typing. */
    .search-controls {
      margin-top: 52px;
      display: flex; flex-direction: column; align-items: flex-start; gap: 18px;
      opacity: 0; pointer-events: none; transition: opacity .6s ease;
    }
    .search-controls.show { opacity: 1; pointer-events: auto; }
    .searching-block { margin: 0; color: var(--muted); }   /* below the search button */

    @media (max-width: 980px) {
      #stage { flex-direction: column; align-items: stretch; }
      #stage.active .hero { transform: none; }
      .analysis-stage {
        position: static; transform: none; width: 100%; max-width: 520px;
        max-height: none; margin: 24px 0;
      }
      #stage.active .analysis-stage { transform: none; }
      .results-col { position: static; width: 100%; }
    }

    /* ---- dual-thumb price range: two numbers on top, no labels ---- */
    /* Budget: label, a line with two circles, then the selected $range below. */
    .range { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; width: 100%; }
    .budget-label, .budget-range {
      font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; color: var(--ink); font-variant-numeric: tabular-nums;
    }
    .budget-label { color: var(--muted); }
    .range .track { position: relative; width: min(280px, 100%); height: 22px; }
    .range .rail, .range .fill { position: absolute; top: 10px; height: 1px; border-radius: 1px; }
    .range .rail { left: 0; right: 0; background: #ccc; }
    .range .fill { background: var(--ink); }
    .range input[type=range] {
      position: absolute; left: 0; top: 0; width: 100%; height: 22px; margin: 0;
      -webkit-appearance: none; appearance: none; background: none; pointer-events: none;
    }
    /* Tiny 2px dots, centered on the line. The transparent border just keeps the
       grab area usable — the visible dot is 2px (background-clip: padding-box). */
    .range input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; pointer-events: auto;
      box-sizing: content-box;
      width: 2px; height: 2px; border-radius: 50%;
      background: var(--ink); background-clip: padding-box;
      border: 8px solid transparent; cursor: pointer;
    }
    .range input[type=range]::-moz-range-thumb {
      box-sizing: content-box;
      width: 2px; height: 2px; border-radius: 50%;
      background: var(--ink); background-clip: padding-box;
      border: 8px solid transparent; cursor: pointer;
    }
    .range input[type=range]::-webkit-slider-runnable-track { background: none; height: 22px; }
    .range input[type=range]::-moz-range-track { background: none; height: 2px; }

    /* ---- GO: plain underlined text, no button chrome ---- */
    .go {
      background: none; border: 0; padding: 0;
      font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; font-weight: 500; letter-spacing: .04em;
      color: var(--ink); text-decoration: underline; text-underline-offset: 4px;
      text-decoration-thickness: 1px; cursor: pointer;
    }
    .go:hover { color: #555; }
    .go:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
    .go-status {
      font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; color: var(--muted); min-height: 1.1em;
    }

    /* ---- products: rightmost column, two sections, 2 per row, editorial ---- */
    .results-col {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 40vw; overflow-y: auto;
      display: flex; flex-direction: column; gap: 36px;
      opacity: 0; pointer-events: none; transition: opacity .5s ease;
    }
    .results-col.show { opacity: 1; pointer-events: auto; }
    .group-title {
      font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; font-weight: 500; letter-spacing: .05em; color: var(--muted);
      margin: 0 0 16px;
    }
    .grid {
      list-style: none; padding: 0; margin: 0;
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px 16px;
    }
    .card a { text-decoration: none; color: inherit; display: block; }
    .thumb {
      aspect-ratio: 3 / 4; background: #f4f4f4; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb.placeholder::after {
      content: "no image"; color: #bbb; font-size: 12px;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
    }
    /* All product meta one consistent size, IBM Plex Mono. */
    .meta {
      font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; line-height: 1.5; color: var(--ink); margin-top: 10px;
    }
    .meta .m-match { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <button type="button" id="cost-toggle" class="cost-link">how much did this cost?</button>
    <div id="cost-panel" style="display:none"></div>
    <h1>Jacque</h1>
  </header>

  <div id="stage">
    <main class="hero">
      <input type="file" id="image" accept="image/*" hidden />
      <img id="preview" class="preview" alt="Your uploaded image" hidden />
      <label for="image" class="want">Drop a garment</label>
    </main>

    <div id="analysis-stage" class="analysis-stage">
      <pre id="typed" class="typed"></pre>

      <!-- Below the read, with a big gap; fades in after typing finishes. -->
      <div id="search-controls" class="search-controls">
        <div class="range" aria-label="Budget">
          <div class="budget-label">budget</div>
          <div class="track">
            <div class="rail"></div>
            <div class="fill" id="p-fill"></div>
            <input type="range" id="min_price" min="0" max="1000" step="10" value="0" aria-label="Minimum budget" />
            <input type="range" id="max_price" min="0" max="1000" step="10" value="1000" aria-label="Maximum budget" />
          </div>
          <div class="budget-range" id="p-range">$0-$1000+</div>
        </div>
        <button type="button" id="go" class="go">search →</button>
        <pre id="searching" class="typed searching-block" hidden></pre>
        <div id="go-status" class="go-status"></div>
      </div>
    </div>

    <!-- Rightmost column: results in two sections, fades in after search. -->
    <div id="results-col" class="results-col"></div>
  </div>

  <script>
    const goBtn = document.getElementById("go");
    const goStatus = document.getElementById("go-status");
    const stage = document.getElementById("stage");
    const typedEl = document.getElementById("typed");
    const searchControls = document.getElementById("search-controls");
    const searchingEl = document.getElementById("searching");
    const resultsCol = document.getElementById("results-col");
    const imageInput = document.getElementById("image");
    const costToggle = document.getElementById("cost-toggle");
    const costPanel = document.getElementById("cost-panel");
    let currentAnalysis = null;   // set by analyzeImage(); consumed by Go

    // --- Mock mode: add ?mock to the URL to view the UI without LLM/search calls ---
    const MOCK = location.search.includes("mock");
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const MOCK_ANALYSIS = {
      item: {
        category: "crop top", silhouette: "asymmetric, body-skimming", color_family: "black",
        pattern: "solid", material_guess: "stretch jersey", formality: "smart casual",
        aesthetic_tags: ["90s minimalism", "sleek", "going-out"],
      },
      queries: ["black asymmetric crop top", "sleek going-out jersey top",
                "90s minimalist black top", "one shoulder stretch crop"],
      display: {
        category: "crop top", color: "black", material: "stretch jersey",
        lines: ["asymmetric", "body-skimming", "90s minimalism"],
        occasions: ["evening", "gallery", "city"],
      },
    };
    const MOCK_PRODUCTS = [
      ["Asymmetric jersey top", "COS", "$59", "jacque1", 90, 72],
      ["One-shoulder crop", "Aritzia", "$45", "jacque2", 86, 61],
      ["Ruched going-out top", "Reformation", "$98", "jacque3", 83, 55],
      ["Slinky black tank", "Mango", "$29", "jacque4", 80, 79],
      ["Draped asym top", "& Other Stories", "$65", "jacque5", 77, 63],
      ["90s mesh top", "Urban Outfitters", "$34", "jacque6", 74, 58],
      ["Cap-sleeve crop", "Zara", "$25", "jacque7", 70, 66],
      ["Halter knit top", "Nordstrom", "$72", "jacque8", 66, 64],
    ].map(([title, brand, price, seed, vibe, vers]) => ({
      title, brand, price, domain: brand, url: "#",
      image: "https://picsum.photos/seed/" + seed + "/400/520",
      matched_queries: ["mock"],
      score: { vibe_match: vibe, versatility: vers, notes: [] },
    }));

    // Uploading an image immediately previews it and reads it with Sonnet.
    const preview = document.getElementById("preview");
    let previewUrl = null;
    imageInput.addEventListener("change", () => {
      const f = imageInput.files[0];
      if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
      if (!f) { preview.hidden = true; preview.removeAttribute("src"); return; }
      previewUrl = URL.createObjectURL(f);
      preview.src = previewUrl;
      preview.hidden = false;
      analyzeImage(f);
    });

    // Step 1: read the piece. Slides the hero left, types the summary, then
    // reveals the price + Go controls for the user to review before searching.
    async function analyzeImage(f) {
      currentAnalysis = null;
      searchControls.classList.remove("show");
      stopSearching();
      resultsCol.classList.remove("show");
      resultsCol.innerHTML = "";
      stage.classList.add("active");
      typeText(typedEl, "reading...");

      if (MOCK) {
        await sleep(500);
        currentAnalysis = MOCK_ANALYSIS;
        typeSegments(typedEl, analysisSegments(currentAnalysis), {
          done: () => { searchControls.classList.add("show"); },
        });
        return;
      }

      const fd = new FormData();
      fd.append("image", f);
      let data;
      try {
        const resp = await fetch("/api/assist", { method: "POST", body: fd });
        data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "Request failed");
      } catch (err) {
        typeText(typedEl, "hm, couldn't read that:\n" + err.message);
        return;
      }
      recordCost(data.cost);
      currentAnalysis = data.analysis;
      // Type the read segment-by-segment, pausing between groups like thinking;
      // the price slider + Go appear once it's done.
      typeSegments(typedEl, analysisSegments(currentAnalysis), {
        done: () => { searchControls.classList.add("show"); },
      });
    }

    // ---- Cost tracking (unfolds from the top-right link) -------------------
    let costTotal = 0;
    let costCount = 0;
    const costLog = [];

    function recordCost(cost) {
      if (!cost) return;
      if (cost.cost_usd != null) {
        costTotal += cost.cost_usd;
        costCount += 1;
      }
      costLog.unshift(cost);
      renderCost();
    }

    function renderCost() {
      const avg = costCount ? costTotal / costCount : 0;
      let html =
        "<div class='cost-head'><b>How much did this cost?</b>" +
        "<button type='button' id='cost-retract'>retract ▲</button></div>";
      html +=
        "Session: $" + costTotal.toFixed(5) + " over " + costCount +
        " billed call(s) (avg $" + avg.toFixed(5) + ")<br/>";
      html += "<button type='button' id='cost-reset'>Reset</button><ul>";
      for (const c of costLog.slice(0, 12)) {
        if (c.cost_usd == null) {
          html += "<li>" + c.backend + ": " + (c.note || "not tracked") + "</li>";
        } else {
          let line =
            c.backend + " [" + c.model + "] — $" + c.cost_usd.toFixed(5) +
            " (in " + c.input_tokens + ", out " + c.output_tokens;
          if (c.web_searches) line += ", " + c.web_searches + " web search(es)";
          line += ")";
          html += "<li>" + line + "</li>";
        }
      }
      html += "</ul>";
      costPanel.innerHTML = html;
      document.getElementById("cost-reset").addEventListener("click", () => {
        costTotal = 0; costCount = 0; costLog.length = 0; renderCost();
      });
      document.getElementById("cost-retract").addEventListener("click", () => {
        costPanel.style.display = "none";
      });
    }

    costToggle.addEventListener("click", () => {
      costPanel.style.display = costPanel.style.display === "none" ? "block" : "none";
    });
    renderCost();

    // ---- Dual-thumb price range --------------------------------------------
    const SLIDER_MAX = 1000;
    const minR = document.getElementById("min_price");
    const maxR = document.getElementById("max_price");
    const pRange = document.getElementById("p-range");
    const pFill = document.getElementById("p-fill");

    function fmtPrice(v) { return v >= SLIDER_MAX ? "$" + SLIDER_MAX + "+" : "$" + v; }

    function syncRange(e) {
      let lo = +minR.value, hi = +maxR.value;
      if (lo > hi) {
        if (e && e.target === minR) { lo = hi; minR.value = lo; }
        else { hi = lo; maxR.value = hi; }
      }
      pRange.textContent = fmtPrice(lo) + "-" + fmtPrice(hi);
      const l = (lo / SLIDER_MAX) * 100, r = (hi / SLIDER_MAX) * 100;
      pFill.style.left = l + "%";
      pFill.style.width = (r - l) + "%";
    }
    minR.addEventListener("input", syncRange);
    maxR.addEventListener("input", syncRange);
    syncRange();

    // ---- Escape model-supplied text before inserting as HTML ---------------
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // ---- Typewriter (per-element token so two blocks can type independently) -
    function typeText(el, text, speed = 11, done) {
      const tok = (el.__tok = (el.__tok || 0) + 1);
      el.textContent = "";
      el.classList.add("typing");   // kept on after completion so the cursor keeps blinking
      let i = 0;
      (function step() {
        if (el.__tok !== tok) return;   // superseded by a newer call on this element
        if (i >= text.length) { if (done) done(); return; }
        el.textContent += text.charAt(i++);
        if (el.parentElement) el.parentElement.scrollTop = el.parentElement.scrollHeight;
        setTimeout(step, speed);
      })();
    }

    // Type segments one at a time, pausing between them — reads like thinking.
    function typeSegments(el, segments, { speed = 18, pause = 460, done } = {}) {
      const tok = (el.__tok = (el.__tok || 0) + 1);
      el.textContent = "";
      el.classList.add("typing");
      let si = 0, ci = 0;
      (function step() {
        if (el.__tok !== tok) return;
        if (si >= segments.length) { if (done) done(); return; }
        const seg = segments[si];
        if (ci === 0 && si > 0) el.textContent += "\n\n";   // blank line between groups
        if (ci < seg.length) {
          el.textContent += seg.charAt(ci++);
          if (el.parentElement) el.parentElement.scrollTop = el.parentElement.scrollHeight;
          setTimeout(step, speed + Math.random() * speed);   // slight human jitter
        } else {
          si++; ci = 0;
          setTimeout(step, pause);   // pause (thinking) before the next group
        }
      })();
    }

    // Editorial-shorthand read (display only), split into segments. The precise
    // `item` is preserved for the reranker/queries — just not shown.
    function analysisSegments(a) {
      const it = (a && a.display) || {};
      const segs = ["reading..."];
      if (it.category) segs.push(it.category);
      const cm = [it.color, it.material].filter(Boolean);
      if (cm.length) segs.push(cm.join("\n"));
      if ((it.lines || []).length) segs.push(it.lines.join("\n"));
      if ((it.occasions || []).length) segs.push("wears best\n" + it.occasions.join("\n"));
      return segs;
    }

    // While a search is in flight: rotate through the search phrases, typing each.
    let searchTimer = null;
    function startSearching(queries) {
      const phrases = (queries && queries.length) ? queries : ["the racks"];
      searchingEl.hidden = false;
      let i = 0;
      (function cycle() {
        const q = phrases[i % phrases.length];
        i++;
        typeText(searchingEl, "searching   " + q, 16, () => {
          searchTimer = setTimeout(cycle, 650);
        });
      })();
    }
    function stopSearching() {
      if (searchTimer) { clearTimeout(searchTimer); searchTimer = null; }
      searchingEl.__tok = (searchingEl.__tok || 0) + 1;   // cancel any in-flight typing
      searchingEl.textContent = "";
      searchingEl.hidden = true;     // disappears when done searching
    }

    // ---- Ranking + results (two sections in the right column) --------------
    let lastProducts = [];

    // Fixed ranking (no sliders): vibe-dominant, plus a little versatility.
    function rankScore(p) {
      const s = p.score; if (!s) return -1;
      const v = s.vibe_match || 0;
      const ver = (s.versatility == null ? v : s.versatility);
      return 0.75 * v + 0.25 * ver;
    }

    function cardEl(p) {
      const li = document.createElement("li");
      li.className = "card";
      const a = document.createElement("a");
      a.href = p.url || "#"; a.target = "_blank"; a.rel = "noopener";

      const thumb = document.createElement("div");
      thumb.className = "thumb";
      if (p.image) {
        const img = document.createElement("img");
        img.loading = "lazy"; img.decoding = "async"; img.src = p.image; img.alt = p.title || "";
        img.addEventListener("error", () => { thumb.classList.add("placeholder"); img.remove(); });
        thumb.appendChild(img);
      } else {
        thumb.classList.add("placeholder");
      }
      a.appendChild(thumb);

      const meta = document.createElement("div");
      meta.className = "meta";
      const brand = p.brand || p.domain || "";
      const match = p.score ? (p.score.vibe_match ?? "—") : "—";
      meta.innerHTML =
        (brand ? "<div class='m-brand'>" + esc(brand) + "</div>" : "") +
        (p.price ? "<div class='m-price'>" + esc(p.price) + "</div>" : "") +
        "<div class='m-match'>match " + match + "</div>";
      a.appendChild(meta);

      li.appendChild(a);
      return li;
    }

    function groupEl(title, items) {
      const sec = document.createElement("section");
      const h = document.createElement("div");
      h.className = "group-title";
      h.textContent = title;
      sec.appendChild(h);
      const ul = document.createElement("ul");
      ul.className = "grid";
      items.forEach((p) => ul.appendChild(cardEl(p)));
      sec.appendChild(ul);
      return sec;
    }

    // From the top 6 by ranking: "closest match" = the 2 highest-vibe of them,
    // "Jacque's picks" = the rest, in ranking order. Max 6 shown total.
    function renderResults(products) {
      resultsCol.innerHTML = "";
      const scored = (products || []).filter((p) => p.score);
      if (!scored.length) {
        const empty = document.createElement("div");
        empty.className = "group-title";
        empty.textContent = "no matches";
        resultsCol.appendChild(empty);
        return;
      }
      const byRank = [...scored].sort((a, b) => rankScore(b) - rankScore(a)).slice(0, 6);
      const byVibe = [...byRank].sort((a, b) => (b.score.vibe_match || 0) - (a.score.vibe_match || 0));
      const closest = byVibe.slice(0, 2);
      const closestUrls = new Set(closest.map((p) => p.url));
      const picks = byRank.filter((p) => !closestUrls.has(p.url));
      resultsCol.appendChild(groupEl("closest match", closest));
      if (picks.length) resultsCol.appendChild(groupEl("Jacque's picks", picks));
    }

    // ---- GO: step 2 — search Google Shopping for the reviewed analysis -----
    goBtn.addEventListener("click", async () => {
      if (!currentAnalysis || !(currentAnalysis.queries || []).length) {
        goStatus.textContent = "Upload an image first.";
        return;
      }
      goStatus.textContent = "";
      resultsCol.classList.remove("show");
      resultsCol.innerHTML = "";
      startSearching(currentAnalysis.queries);   // rotate phrases immediately

      if (MOCK) {
        await sleep(1300);
        stopSearching();
        lastProducts = MOCK_PRODUCTS;
        renderResults(lastProducts);
        resultsCol.classList.add("show");
        return;
      }

      const fd = new FormData();
      fd.append("analysis", JSON.stringify(currentAnalysis));
      const lo = +minR.value, hi = +maxR.value;
      if (lo > 0) fd.append("min_price", lo);
      if (hi < SLIDER_MAX) fd.append("max_price", hi);

      let data;
      try {
        const resp = await fetch("/api/search_for", { method: "POST", body: fd });
        data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "Request failed");
      } catch (err) {
        stopSearching();
        goStatus.textContent = "Error: " + err.message;
        return;
      }

      stopSearching();   // animation disappears when done searching
      (data.costs || []).forEach(recordCost);
      lastProducts = data.products || [];
      renderResults(lastProducts);
      resultsCol.classList.add("show");
    });
  </script>
</body>
</html>
