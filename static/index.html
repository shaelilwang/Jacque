<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jacque</title>
</head>
<body>
  <h1>Jacque</h1>
  <p>Upload an image to find products you can buy.</p>

  <form id="search-form">
    <p><input type="file" id="image" name="image" accept="image/*" required /></p>
    <p>
      <button type="button" id="assist-btn">Fill description (Sonnet)</button>
      <span id="assist-status"></span>
    </p>
    <div id="assist-detail"></div>
    <p>
      <label>Query (auto-filled by Sonnet, editable):<br />
        <textarea id="query" name="query" rows="4" cols="60"
          placeholder="Describe items + style, or click 'Fill description'"></textarea>
      </label>
    </p>
    <p>
      <label>
        <input type="checkbox" id="scoped" checked />
        Search my scoped sites (sites.txt) instead of Channel3
      </label>
    </p>
    <p>
      <label>
        <input type="checkbox" id="cost-toggle" />
        Track cost (compare spend before/after backend changes)
      </label>
    </p>
    <p><button type="submit">Search</button></p>
  </form>

  <div id="cost-panel" style="display:none"></div>

  <p id="status"></p>
  <ul id="results"></ul>

  <script>
    const form = document.getElementById("search-form");
    const statusEl = document.getElementById("status");
    const results = document.getElementById("results");
    const assistBtn = document.getElementById("assist-btn");
    const assistStatus = document.getElementById("assist-status");
    const assistDetail = document.getElementById("assist-detail");
    const costToggle = document.getElementById("cost-toggle");
    const costPanel = document.getElementById("cost-panel");

    // Cost tracking — accumulate across assist + search calls so you can
    // compare total pipeline spend before vs. after swapping the backend.
    let costTotal = 0;
    let costCount = 0;
    const costLog = [];

    function recordCost(cost) {
      if (!cost) return;
      if (cost.cost_usd != null) {
        costTotal += cost.cost_usd;
        costCount += 1;
      }
      costLog.unshift(cost);
      renderCost();
    }

    function renderCost() {
      const avg = costCount ? costTotal / costCount : 0;
      let html = "<b>Cost tracking</b><br/>";
      html +=
        "Session: $" + costTotal.toFixed(5) + " over " + costCount +
        " billed call(s) (avg $" + avg.toFixed(5) + ")<br/>";
      html += "<button type='button' id='cost-reset'>Reset</button><ul>";
      for (const c of costLog.slice(0, 12)) {
        if (c.cost_usd == null) {
          html += "<li>" + c.backend + ": " + (c.note || "not tracked") + "</li>";
        } else {
          let line =
            c.backend + " [" + c.model + "] — $" + c.cost_usd.toFixed(5) +
            " (in " + c.input_tokens + ", out " + c.output_tokens;
          if (c.web_searches) line += ", " + c.web_searches + " web search(es)";
          line += ")";
          html += "<li>" + line + "</li>";
        }
      }
      html += "</ul>";
      costPanel.innerHTML = html;
      document.getElementById("cost-reset").addEventListener("click", () => {
        costTotal = 0;
        costCount = 0;
        costLog.length = 0;
        renderCost();
      });
    }

    costToggle.addEventListener("change", () => {
      costPanel.style.display = costToggle.checked ? "block" : "none";
    });
    renderCost();

    // Text-assist step: send the image to Sonnet, fill the query box.
    assistBtn.addEventListener("click", async () => {
      const fileInput = document.getElementById("image");
      if (!fileInput.files[0]) {
        assistStatus.textContent = "Pick an image first.";
        return;
      }
      assistStatus.textContent = "Asking Sonnet...";
      assistDetail.textContent = "";

      const fd = new FormData();
      fd.append("image", fileInput.files[0]);

      let data;
      try {
        const resp = await fetch("/api/assist", { method: "POST", body: fd });
        data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "Request failed");
      } catch (err) {
        assistStatus.textContent = "Error: " + err.message;
        return;
      }

      document.getElementById("query").value = data.query;
      assistStatus.textContent = "Filled.";
      assistDetail.innerHTML =
        "<p><b>Items:</b> " + (data.items || "") + "</p>" +
        "<p><b>Style:</b> " + (data.style || "") + "</p>";
      recordCost(data.cost);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      results.innerHTML = "";
      statusEl.textContent = "Searching...";

      const fileInput = document.getElementById("image");
      const query = document.getElementById("query").value;

      const scoped = document.getElementById("scoped").checked;
      const endpoint = scoped ? "/api/search_scoped" : "/api/search";

      const fd = new FormData();
      if (fileInput.files[0]) fd.append("image", fileInput.files[0]);
      if (query) fd.append("query", query);

      let data;
      try {
        const resp = await fetch(endpoint, { method: "POST", body: fd });
        data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "Request failed");
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        return;
      }

      recordCost(data.cost);

      const products = data.products || [];
      if (products.length === 0) {
        statusEl.textContent = "No products found.";
        return;
      }

      statusEl.textContent = products.length + " result(s):";
      for (const p of products) {
        const li = document.createElement("li");

        if (p.image) {
          const img = document.createElement("img");
          img.src = p.image;
          img.alt = p.title;
          img.width = 80;
          li.appendChild(img);
          li.appendChild(document.createTextNode(" "));
        }

        const link = document.createElement("a");
        link.href = p.url || "#";
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent = p.title || "(untitled)";
        li.appendChild(link);

        const meta = [];
        if (p.brand) meta.push(p.brand);
        if (p.price) meta.push(p.price);
        if (p.domain) meta.push(p.domain);
        if (meta.length) {
          li.appendChild(document.createTextNode(" — " + meta.join(" · ")));
        }

        results.appendChild(li);
      }
    });
  </script>
</body>
</html>
