<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jacque</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; }

    /* Responsive product grid: cards size themselves, wrap to fit. */
    #results {
      list-style: none;
      padding: 0;
      margin: 16px 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
    }
    .card {
      display: flex;
      flex-direction: column;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      transition: box-shadow .15s ease, transform .15s ease;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-2px); }
    .card a { text-decoration: none; color: inherit; display: flex; flex-direction: column; height: 100%; }

    /* Fixed-aspect image box so the grid stays tidy regardless of image size. */
    .thumb {
      aspect-ratio: 3 / 4;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* Placeholder shown when there's no image (or it fails to load). */
    .thumb.placeholder::after {
      content: "No image";
      color: #aaa;
      font-size: 13px;
    }

    .card-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .card-title {
      font-size: 14px; line-height: 1.3; font-weight: 500;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-price { font-size: 14px; font-weight: 600; }
    .card-domain { font-size: 12px; color: #888; margin-top: auto; }
    .card-matches { font-size: 11px; color: #aaa; }

    /* Analysis panel (from the Sonnet image analysis). */
    .analysis {
      border: 1px solid #e5e5e5; border-radius: 10px; background: #fafafa;
      padding: 12px 14px; margin: 8px 0; max-width: 640px;
    }
    .analysis .row { font-size: 14px; margin: 4px 0; }
    .analysis .row.muted { color: #777; font-size: 13px; }
    .chip {
      display: inline-block; font-size: 12px; padding: 2px 8px; margin: 2px 3px 2px 0;
      border-radius: 999px; background: #ececf3; color: #444;
    }
    .chip.q { background: #e7f0ff; color: #245; font-family: ui-monospace, monospace; }

    /* Rerank scores on cards. */
    .thumb { position: relative; }
    .score-badge {
      position: absolute; top: 8px; left: 8px; background: rgba(17,17,17,.88);
      color: #fff; font-size: 12px; font-weight: 700; padding: 4px 7px; border-radius: 6px;
    }
    .subscores { font-size: 11px; color: #555; display: flex; flex-wrap: wrap; gap: 8px; }
    .notes { list-style: none; margin: 6px 0 0; padding: 0; font-size: 12.5px; line-height: 1.4; color: #2a2a2a; }
    .notes li { margin: 2px 0; }

    /* Re-weight controls. */
    #weights {
      border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; margin: 12px 0;
      max-width: 660px; display: flex; flex-wrap: wrap; gap: 8px 18px; align-items: center;
    }
    #weights .lbl { font-weight: 600; font-size: 13px; }
    #weights label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
    #weights input[type=range] { width: 110px; }
    #weights .val { font-variant-numeric: tabular-nums; color: #666; width: 2.2em; text-align: right; }
  </style>
</head>
<body>
  <h1>Jacque</h1>
  <p>Describe what you want, or upload an image to find products you can buy.</p>

  <form id="search-form">
    <p>
      <input type="file" id="image" name="image" accept="image/*" />
      <span> (optional — leave empty to search by description only)</span>
    </p>
    <p>
      <button type="button" id="assist-btn">Find similar from image (Sonnet → Google Shopping)</button>
      <span id="assist-status"></span>
    </p>
    <div id="assist-detail"></div>
    <p>
      <label>Query (type a description, or auto-fill from an image):<br />
        <textarea id="query" name="query" rows="4" cols="60"
          placeholder="Describe items + style, or click 'Fill description'"></textarea>
      </label>
    </p>
    <p>
      <label>
        <input type="checkbox" id="scoped" checked />
        Search Google Shopping (SerpApi) instead of Channel3
      </label>
    </p>
    <p id="price-filter">
      <label>Price range (USD, optional):</label>
      <input type="number" id="min_price" min="0" step="1" placeholder="min" style="width:80px" />
      <span>–</span>
      <input type="number" id="max_price" min="0" step="1" placeholder="max" style="width:80px" />
    </p>
    <p>
      <label>
        <input type="checkbox" id="cost-toggle" />
        Track cost (compare spend before/after backend changes)
      </label>
    </p>
    <p><button type="submit">Search</button></p>
  </form>

  <div id="cost-panel" style="display:none"></div>

  <div id="weights" style="display:none">
    <span class="lbl">Re-weight ranking:</span>
    <label>Vibe <input type="range" id="w-vibe" min="0" max="100" value="75" /><span class="val" id="w-vibe-v">75</span></label>
    <label>Versatility <input type="range" id="w-vers" min="0" max="100" value="25" /><span class="val" id="w-vers-v">25</span></label>
  </div>

  <p id="status"></p>
  <ul id="results"></ul>

  <script>
    const form = document.getElementById("search-form");
    const statusEl = document.getElementById("status");
    const results = document.getElementById("results");
    const assistBtn = document.getElementById("assist-btn");
    const assistStatus = document.getElementById("assist-status");
    const assistDetail = document.getElementById("assist-detail");
    const costToggle = document.getElementById("cost-toggle");
    const costPanel = document.getElementById("cost-panel");

    // Cost tracking — accumulate across assist + search calls so you can
    // compare total pipeline spend before vs. after swapping the backend.
    let costTotal = 0;
    let costCount = 0;
    const costLog = [];

    function recordCost(cost) {
      if (!cost) return;
      if (cost.cost_usd != null) {
        costTotal += cost.cost_usd;
        costCount += 1;
      }
      costLog.unshift(cost);
      renderCost();
    }

    function renderCost() {
      const avg = costCount ? costTotal / costCount : 0;
      let html = "<b>Cost tracking</b><br/>";
      html +=
        "Session: $" + costTotal.toFixed(5) + " over " + costCount +
        " billed call(s) (avg $" + avg.toFixed(5) + ")<br/>";
      html += "<button type='button' id='cost-reset'>Reset</button><ul>";
      for (const c of costLog.slice(0, 12)) {
        if (c.cost_usd == null) {
          html += "<li>" + c.backend + ": " + (c.note || "not tracked") + "</li>";
        } else {
          let line =
            c.backend + " [" + c.model + "] — $" + c.cost_usd.toFixed(5) +
            " (in " + c.input_tokens + ", out " + c.output_tokens;
          if (c.web_searches) line += ", " + c.web_searches + " web search(es)";
          line += ")";
          html += "<li>" + line + "</li>";
        }
      }
      html += "</ul>";
      costPanel.innerHTML = html;
      document.getElementById("cost-reset").addEventListener("click", () => {
        costTotal = 0;
        costCount = 0;
        costLog.length = 0;
        renderCost();
      });
    }

    costToggle.addEventListener("change", () => {
      costPanel.style.display = costToggle.checked ? "block" : "none";
    });
    renderCost();

    // Escape model-supplied text before inserting as HTML.
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Show the Sonnet analysis: item attributes, versatility, and the queries used.
    function renderAnalysis(a) {
      if (!a) { assistDetail.innerHTML = ""; return; }
      const it = a.item || {};
      const vb = a.versatility_base || {};
      const facts = [it.silhouette, it.color_family, it.pattern, it.formality]
        .filter(Boolean).map(esc).join(" · ");
      const tags = (it.aesthetic_tags || [])
        .map((t) => "<span class='chip'>" + esc(t) + "</span>").join(" ");
      const queries = (a.queries || [])
        .map((q) => "<span class='chip q'>" + esc(q) + "</span>").join(" ");
      const score = vb.score == null ? "—" : vb.score;
      assistDetail.innerHTML =
        "<div class='analysis'>" +
          "<div class='row'><b>" + esc(it.category || "item") + "</b>" +
            (facts ? " · " + facts : "") + "</div>" +
          (it.material_guess ? "<div class='row muted'>material: " + esc(it.material_guess) + "</div>" : "") +
          (tags ? "<div class='row'>" + tags + "</div>" : "") +
          "<div class='row'><b>Versatility " + score + "/100</b> — " + esc(vb.rationale || "") + "</div>" +
          "<div class='row muted'>Searched (aggregated): " + queries + "</div>" +
        "</div>";
    }

    // --- Rerank state + re-weighting ----------------------------------------
    let lastProducts = [];  // products carrying per-dimension `score` objects
    const weightsPanel = document.getElementById("weights");
    const wVibe = document.getElementById("w-vibe");
    const wVers = document.getElementById("w-vers");

    // Weighted combine of the two dimensions (vibe dominant by default).
    function combinedScore(s, w) {
      if (!s) return -1;
      const den = w.vibe + w.vers;
      if (!den) return 0;
      return Math.round((w.vibe * (s.vibe_match || 0) + w.vers * (s.versatility || 0)) / den);
    }

    function rankAndRender() {
      document.getElementById("w-vibe-v").textContent = wVibe.value;
      document.getElementById("w-vers-v").textContent = wVers.value;
      const w = { vibe: +wVibe.value, vers: +wVers.value };
      const ranked = lastProducts
        .map((p) => ({ ...p, _combined: combinedScore(p.score, w) }))
        .sort((a, b) => b._combined - a._combined);
      renderProducts(ranked);
    }
    [wVibe, wVers].forEach((el) => el.addEventListener("input", rankAndRender));

    // Render a product grid (shared by the image flow and the text-query form).
    function renderProducts(products) {
      results.innerHTML = "";
      for (const p of products) {
        const li = document.createElement("li");
        li.className = "card";

        const link = document.createElement("a");
        link.href = p.url || "#";
        link.target = "_blank";
        link.rel = "noopener";

        const thumb = document.createElement("div");
        thumb.className = "thumb";
        if (p.image) {
          const img = document.createElement("img");
          img.loading = "lazy";
          img.decoding = "async";
          img.src = p.image;
          img.alt = p.title || "";
          img.addEventListener("error", () => {
            thumb.classList.add("placeholder");
            img.remove();
          });
          thumb.appendChild(img);
        } else {
          thumb.classList.add("placeholder");
        }
        // Combined (re-weighted) score badge, when reranked.
        if (p._combined != null && p._combined >= 0) {
          const badge = document.createElement("div");
          badge.className = "score-badge";
          badge.textContent = p._combined;
          badge.title = "Combined score — re-weight with the sliders above";
          thumb.appendChild(badge);
        }
        link.appendChild(thumb);

        const body = document.createElement("div");
        body.className = "card-body";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = p.title || "(untitled)";
        body.appendChild(title);

        const priceText = [p.brand, p.price].filter(Boolean).join(" · ");
        if (priceText) {
          const price = document.createElement("div");
          price.className = "card-price";
          price.textContent = priceText;
          body.appendChild(price);
        }

        if (p.domain) {
          const domain = document.createElement("div");
          domain.className = "card-domain";
          domain.textContent = p.domain;
          body.appendChild(domain);
        }

        // Per-dimension scores + glanceable verdict notes (❤️ / 💔 / ❓).
        if (p.score) {
          const s = p.score;
          const sub = document.createElement("div");
          sub.className = "subscores";
          sub.innerHTML =
            "<span>vibe " + (s.vibe_match ?? "—") + "</span>" +
            "<span>versatility " + (s.versatility ?? "—") + "</span>";
          body.appendChild(sub);

          const notes = s.notes || [];
          if (notes.length) {
            const ul = document.createElement("ul");
            ul.className = "notes";
            const icon = { heart: "❤️", heartbreak: "💔", question: "❓" };
            for (const n of notes) {
              const li = document.createElement("li");
              li.textContent = (icon[n.verdict] || "•") + " " + (n.text || "");
              ul.appendChild(li);
            }
            body.appendChild(ul);
          }
        }

        // Provenance: how many of the analysis queries surfaced this item.
        const matches = (p.matched_queries || []).length;
        if (matches > 1) {
          const m = document.createElement("div");
          m.className = "card-matches";
          m.textContent = "matched " + matches + " queries";
          body.appendChild(m);
        }

        link.appendChild(body);
        li.appendChild(link);
        results.appendChild(li);
      }
    }

    // Image flow: one Sonnet call analyzes the item, then its queries are
    // searched on Google Shopping and aggregated (ready for reranking).
    assistBtn.addEventListener("click", async () => {
      const fileInput = document.getElementById("image");
      if (!fileInput.files[0]) {
        assistStatus.textContent = "Pick an image first.";
        return;
      }
      assistStatus.textContent = "Analyzing image + searching…";
      assistDetail.innerHTML = "";
      results.innerHTML = "";
      statusEl.textContent = "";

      const fd = new FormData();
      fd.append("image", fileInput.files[0]);
      const minP = document.getElementById("min_price").value.trim();
      const maxP = document.getElementById("max_price").value.trim();
      if (minP) fd.append("min_price", minP);
      if (maxP) fd.append("max_price", maxP);

      let data;
      try {
        const resp = await fetch("/api/discover", { method: "POST", body: fd });
        data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "Request failed");
      } catch (err) {
        assistStatus.textContent = "Error: " + err.message;
        return;
      }

      (data.costs || []).forEach(recordCost);
      renderAnalysis(data.analysis);
      lastProducts = data.products || [];
      assistStatus.textContent = "Done.";
      statusEl.textContent = lastProducts.length
        ? lastProducts.length + " result(s), ranked by vibe — re-weight below:"
        : "No products found.";
      weightsPanel.style.display = lastProducts.length ? "flex" : "none";
      rankAndRender();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      results.innerHTML = "";
      statusEl.textContent = "Searching...";

      const fileInput = document.getElementById("image");
      const query = document.getElementById("query").value;

      const scoped = document.getElementById("scoped").checked;
      const endpoint = scoped ? "/api/search_scoped" : "/api/search";

      if (!fileInput.files[0] && !query.trim()) {
        statusEl.textContent = "Type a description or upload an image first.";
        return;
      }
      if (!scoped && !fileInput.files[0]) {
        statusEl.textContent =
          "Channel3 search needs an image. Upload one, or check 'Google Shopping' to search by description.";
        return;
      }

      const fd = new FormData();
      if (fileInput.files[0]) fd.append("image", fileInput.files[0]);
      if (query) fd.append("query", query);
      if (scoped) {
        const minP = document.getElementById("min_price").value.trim();
        const maxP = document.getElementById("max_price").value.trim();
        if (minP) fd.append("min_price", minP);
        if (maxP) fd.append("max_price", maxP);
      }

      let data;
      try {
        const resp = await fetch(endpoint, { method: "POST", body: fd });
        data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "Request failed");
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        return;
      }

      recordCost(data.cost);

      const products = data.products || [];
      if (products.length === 0) {
        statusEl.textContent = "No products found.";
        return;
      }

      statusEl.textContent = products.length + " result(s):";
      lastProducts = [];
      weightsPanel.style.display = "none";
      renderProducts(products);
    });
  </script>
</body>
</html>
